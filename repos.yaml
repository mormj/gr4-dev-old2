# Repository manifest for workspace bootstrap.
# ref accepts a branch, tag, or commit SHA.
repos:
  - name: gnuradio4
    url: https://github.com/fair-acc/gnuradio4
    dest: src/gnuradio4
    ref: main

  - name: gr4-incubator
    url: https://github.com/gnuradio/gr4-incubator
    dest: src/gr4-incubator
    ref: main

  - name: gr4-control-plane
    url: https://github.com/altiolabs/gr4-control-plane
    dest: src/gr4-control-plane
    ref: main

  - name: gr4-studio
    url: https://github.com/altiolabs/gr4-studio
    dest: src/gr4-studio
    ref: main
